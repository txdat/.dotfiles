# 2026-dark — foot terminal colorscheme
# Converted from VSCode 2026 Dark theme
# Source: microsoft/vscode extensions/theme-defaults/themes/2026-dark.json
# License: MIT
#
# Install (foot >= 1.23):
#   mkdir -p ~/.config/foot/themes
#   cp 2026-dark.ini ~/.config/foot/themes/
#
# Then in ~/.config/foot/foot.ini:
#   include=~/.config/foot/themes/2026-dark.ini
#
# Or inline: copy the [colors-dark] block directly into foot.ini
#
# Color mapping:
#   background    editor.background          #121314
#   foreground    editor.foreground          #BBBEBF
#   regular0      sidebar/panel bg (black)   #191A1B
#   regular1      keyword red                #ff7b72
#   regular2      tag green                  #7ee787
#   regular3      variable orange            #ffa657
#   regular4      constant blue              #79c0ff
#   regular5      function purple            #d2a8ff
#   regular6      string light-blue          #a5d6ff
#   regular7      foreground dim             #c9d1d9
#   bright0       border/widget bg           #2A2B2C
#   bright1       invalid/error              #ffa198
#   bright2       git added gutter           #73c991
#   bright3       warning                    #e5ba7d
#   bright4       accent/link blue           #48A0C7
#   bright5       function purple (bright)   #d2a8ff
#   bright6       accent blue                #3994BC
#   bright7       full foreground            #BBBEBF
#   dim0-7        dimmed variants for inactive windows

[colors-dark]
background=121314
foreground=BBBEBF

# Cursor: foreground on cursor block / cursor block color
# Default (reversed cell) is fine; uncomment to override:
# cursor=BBBEBF BBBEBF

# Selection: text / background
selection-foreground=BBBEBF
selection-background=276782

# Normal 16 colors
regular0=191A1B
regular1=ff7b72
regular2=7ee787
regular3=ffa657
regular4=79c0ff
regular5=d2a8ff
regular6=a5d6ff
regular7=c9d1d9

bright0=2A2B2C
bright1=ffa198
bright2=73c991
bright3=e5ba7d
bright4=48A0C7
bright5=d2a8ff
bright6=3994BC
bright7=BBBEBF

# Dim colors — shown in inactive/unfocused panes (tmux, etc.)
# Derived by darkening normal colors ~20%
dim0=121314
dim1=c75f5a
dim2=5faa6a
dim3=c48040
dim4=5a90c0
dim5=a07acc
dim6=7eaaca
dim7=8C8C8C
