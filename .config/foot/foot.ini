[main]
include=~/.config/foot/themes/2026-dark.ini

term=xterm-256color
font=Maple Mono Normal NL NF CN:size=11.5
font-bold=Maple Mono Normal NL NF CN:style=Bold:size=11.5
font-italic=Maple Mono Normal NL NF CN:style=Italic:size=11.5
font-bold-italic=Maple Mono Normal NL NF CN:style=Bold Italic:size=11.5
pad=5x5

[cursor]
style=block
blink=no

[scrollback]
lines=1000
multiplier=3
